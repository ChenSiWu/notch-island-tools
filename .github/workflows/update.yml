name: Update tool metadata

on:
  workflow_dispatch:
  schedule:
    # Weekly run. GitHub Actions cron uses UTC, so 02:00 UTC Monday is 10:00 Monday in Asia/Shanghai.
    - cron: "0 2 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/update_metadata.py
      - run: python scripts/render_docs.py --public
      - name: Commit and push changes
        run: |
          # Only public generated files are committed by CI.
          # PRIVATE.md and data/local-notes.json are ignored and stay local.
          if git diff --quiet -- README.md data/generated-metadata.json; then
            echo "No public changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/generated-metadata.json
          git commit -m "chore: update tool metadata"
          git push
